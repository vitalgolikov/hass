my_deye_power_battery:
  automation:

    # === 1. Электричество пропало (убраны лишние показатели) ===
    - id: a_power_deye_grid_off
      alias: a_power_deye_grid_off
      initial_state: true
      mode: single
      trigger:
        - platform: state
          entity_id: binary_sensor.deye_grid
          from: "on"
          to: "off"
          for: "00:00:10"
      action:
        - delay: "00:00:05"
        - variables:
            vbat: >-
              {% set v = states('sensor.deye_battery_voltage') %}
              {{ v if v not in ['unknown','unavailable',''] else '' }}
            load_p: >-
              {% set l = states('sensor.load_power') %}
              {{ l if l not in ['unknown','unavailable',''] else '' }}
            nowts: "{{ now().strftime(\"%H:%M' %d.%m\") }}"
        - service: telegram_bot.send_message
          data:
            chat_id:
              - 374673383
              - 496868345
            message: |-
              🚨 Свет пропал
              {% if vbat %}🔋 Напряжение АКБ: {{ vbat }} В{% endif %}
              {% if load_p %}⚙️ Нагрузка: {{ load_p }} Вт{% endif %}
              🕒 Время: {{ nowts }}

    # === 2. Электричество восстановлено (добавлено напряжение сети L1) ===
    - id: a_power_deye_grid_on
      alias: a_power_deye_grid_on
      initial_state: true
      mode: single
      trigger:
        - platform: state
          entity_id: binary_sensor.deye_grid
          from: "off"
          to: "on"
          for: "00:00:10"
      action:
        - delay: "00:00:05"
        - variables:
            cap: "{{ states('input_number.battery_capacity_ah') | float(120) }}"
            dur_s: >-
              {{ (as_timestamp(trigger.to_state.last_changed)
               - as_timestamp(trigger.from_state.last_changed)) | int(0) }}
            h: "{{ (dur_s // 3600) | int }}"
            m: "{{ ((dur_s % 3600) // 60) | int }}"
            I: "{{ states('sensor.deye_battery_current') | float(0) }}"
            i_abs: "{{ (I | abs) | round(2) }}"
            vbat: >-
              {% set v = states('sensor.deye_battery_voltage') %}
              {{ v if v not in ['unknown','unavailable',''] else '' }}
            load_p: >-
              {% set l = states('sensor.load_power') %}
              {{ l if l not in ['unknown','unavailable',''] else '' }}
            grid_v: >-
              {% set g = states('sensor.deye_grid_l1_voltage') %}
              {{ g if g not in ['unknown','unavailable',''] else '' }}
            batt_pct: >-
              {% set b = states('sensor.deye_battery') %}
              {{ b if b not in ['unknown','unavailable',''] else '' }}
            nowts: "{{ now().strftime(\"%H:%M' %d.%m\") }}"
        - service: input_number.set_value
          target:
            entity_id: input_number.battery_remaining_ah
          data:
            value: "{{ cap }}"
        - service: telegram_bot.send_message
          data:
            chat_id:
              - 374673383
              - 496868345
            message: |-
              ✅ Свет восстановлен
              ⏱ Отключение длилось: {{ h }} ч {{ '%02d' | format(m) }} мин
              🔌 Ток сейчас: {{ i_abs }} А
              {% if batt_pct %}🪫 Остаток % АКБ: {{ batt_pct }} %{% endif %}
              {% if grid_v %}⚡ Напряжение сети (L1): {{ grid_v }} В{% endif %}
              {% if vbat %}🔋 Напряжение АКБ: {{ vbat }} В{% endif %}
              {% if load_p %}⚙️ Нагрузка: {{ load_p }} Вт{% endif %}
              🕒 Время: {{ nowts }}
