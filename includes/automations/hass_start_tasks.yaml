# Автоуведомление о старте HASS в Telegram + локальное уведомление
# Формат:
# ✅ Home Assistant запущен
# 🕒 Время запуска: 13:56:02, 26.10.2025
# 🗄️ Последняя резервная копия: 02:45  28.10
#
# 🔥 Тёплый пол: ВКЛЮЧЕН
# 💡 Диодное освещение: ВКЛЮЧЕНО

- id: '1761122347275'
  alias: Уведомление о старте HASS (резервная копия + состояния)
  description: Telegram + уведомление при старте, со сведениями о последней резервной копии и статусами тёплого пола и диодной подсветки
  triggers:
    - trigger: homeassistant
      event: start
  conditions: []
  actions:
    - delay: "00:00:20"  # ждём сеть и инициализацию сущностей
    - variables:
        # Преобразуем ISO-время из сенсора в локальную зону и форматируем компактно
        backup_line: >
          {% set raw = states('sensor.backup_last_successful_automatic_backup') %}
          {% if raw in ['unknown','unavailable',''] %}
          🗄️ Последняя резервная копия: неизвестно
          {% else %}
          {% set dt = raw | as_datetime | as_local %}
          🗄️ Последняя резервная копия: {{ dt.strftime('%H:%M') }}  {{ dt.strftime('%d.%m') }}
          {% endif %}
        teply_pol_line: >
          {% if is_state('switch.system_teply_pol', 'on') %}🔥 Тёплый пол: ВКЛЮЧЕН
          {% elif is_state('switch.system_teply_pol', 'off') %}🔥 Тёплый пол: ВЫКЛЮЧЕН
          {% else %}🔥 Тёплый пол: состояние неизвестно{% endif %}
        diod_line: >
          {% if is_state('switch.system_diod', 'on') %}💡 Диодное освещение: ВКЛЮЧЕНО
          {% elif is_state('switch.system_diod', 'off') %}💡 Диодное освещение: ВЫКЛЮЧЕНО
          {% else %}💡 Диодное освещение: состояние неизвестно{% endif %}
    - action: telegram_bot.send_message
      data:
        config_entry_id: 01K85FEY9X86ZAEWBEGMWJEJ7V
        chat_id:
          - '374673383'
        message: |
          ✅ Home Assistant запущен
          🕒 Время запуска: {{ now().strftime('%H:%M:%S, %d.%m.%Y') }}
          {{ backup_line }}

          {{ teply_pol_line }}
          {{ diod_line }}
    - action: persistent_notification.create
      data:
        title: "✅ HASS запущен"
        message: |
          🕒 Время запуска: {{ now().strftime('%H:%M:%S, %d.%m.%Y') }}
          {{ backup_line }}

          {{ teply_pol_line }}
          {{ diod_line }}
  mode: single
